# Google Search Console verification — serve file directly (skip SPA routing)
[[redirects]]
  from = "/google732aa57f167a748a.html"
  to = "/google732aa57f167a748a.html"
  status = 200

# SPA catch-all — must come AFTER specific file rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html must never be cached — it references hashed JS/CSS filenames
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Hashed asset files are immutable — cache them for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
