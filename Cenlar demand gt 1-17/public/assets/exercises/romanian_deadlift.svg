<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="28" cy="10" r="4"/>
  <!-- torso hinged at hip (nearly horizontal) -->
  <line x1="28" y1="14" x2="20" y2="32"/>
  <!-- arms reaching straight down -->
  <line x1="24" y1="22" x2="22" y2="40"/>
  <line x1="28" y1="23" x2="28" y2="42"/>
  <!-- barbell in hands (mid shin level) -->
  <line x1="10" y1="42" x2="50" y2="42"/>
  <line x1="10" y1="38" x2="10" y2="46"/>
  <line x1="50" y1="38" x2="50" y2="46"/>
  <!-- legs (straight, slight knee bend) -->
  <line x1="20" y1="32" x2="18" y2="54"/>
  <line x1="20" y1="32" x2="30" y2="52"/>
  <line x1="18" y1="54" x2="16" y2="60"/>
  <line x1="30" y1="52" x2="32" y2="60"/>
</svg>
