  <line x1="24" y1="44" x2="32" y2="44"/>
  <!-- legs -->
  <line x1="46" y1="38" x2="50" y2="52"/>
  <line x1="46" y1="38" x2="54" y2="50"/>
  <!-- toes -->
  <line x1="50" y1="52" x2="56" y2="52"/>
  <line x1="54" y1="50" x2="58" y2="50"/>
</svg>
