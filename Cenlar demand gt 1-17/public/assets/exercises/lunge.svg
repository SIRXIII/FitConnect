<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="32" cy="10" r="4"/>
  <!-- torso upright -->
  <line x1="32" y1="14" x2="32" y2="32"/>
  <!-- arms at sides -->
  <line x1="32" y1="20" x2="24" y2="30"/>
  <line x1="32" y1="20" x2="40" y2="30"/>
  <!-- front leg (knee bent) -->
  <line x1="32" y1="32" x2="22" y2="44"/>
  <line x1="22" y1="44" x2="18" y2="58"/>
  <!-- back leg (knee on ground) -->
  <line x1="32" y1="32" x2="44" y2="44"/>
  <line x1="44" y1="44" x2="46" y2="58"/>
  <!-- front foot -->
  <line x1="18" y1="58" x2="12" y2="58"/>
  <!-- back knee on floor -->
  <line x1="42" y1="50" x2="50" y2="50"/>
</svg>
