<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="32" cy="10" r="4"/>
  <!-- torso (leaning forward in squat) -->
  <line x1="32" y1="14" x2="30" y2="30"/>
  <!-- barbell across shoulders -->
  <line x1="12" y1="18" x2="52" y2="18"/>
  <line x1="12" y1="16" x2="12" y2="20"/>
  <line x1="52" y1="16" x2="52" y2="20"/>
  <!-- arms on bar -->
  <line x1="30" y1="18" x2="20" y2="18"/>
  <line x1="30" y1="18" x2="44" y2="18"/>
  <!-- hips at bottom of squat -->
  <line x1="30" y1="30" x2="22" y2="44"/>
  <line x1="30" y1="30" x2="38" y2="44"/>
  <!-- lower legs -->
  <line x1="22" y1="44" x2="18" y2="56"/>
  <line x1="38" y1="44" x2="42" y2="56"/>
  <!-- feet -->
  <line x1="18" y1="56" x2="14" y2="56"/>
  <line x1="42" y1="56" x2="46" y2="56"/>
</svg>
