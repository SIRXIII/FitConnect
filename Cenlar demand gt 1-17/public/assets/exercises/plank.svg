<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- head -->
  <circle cx="12" cy="26" r="4"/>
  <!-- torso (horizontal, rigid) -->
  <line x1="12" y1="30" x2="50" y2="34"/>
  <!-- forearm on ground -->
  <line x1="14" y1="30" x2="16" y2="40"/>
  <line x1="16" y1="40" x2="22" y2="40"/>
  <!-- other forearm -->
  <line x1="20" y1="31" x2="22" y2="41"/>
  <!-- legs straight -->
  <line x1="50" y1="34" x2="54" y2="44"/>
  <line x1="50" y1="34" x2="58" y2="42"/>
  <!-- toes on ground -->
  <line x1="54" y1="44" x2="60" y2="44"/>
  <line x1="58" y1="42" x2="62" y2="42"/>
  <!-- floor line -->
  <line x1="4" y1="44" x2="60" y2="44"/>
</svg>
