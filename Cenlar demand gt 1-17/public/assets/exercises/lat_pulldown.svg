<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- overhead cable pulley -->
  <rect x="28" y="2" width="8" height="6" rx="1"/>
  <!-- cables coming down at angle -->
  <line x1="32" y1="8" x2="18" y2="18"/>
  <line x1="32" y1="8" x2="46" y2="18"/>
  <!-- wide bar -->
  <line x1="10" y1="18" x2="54" y2="18"/>
  <!-- head -->
  <circle cx="32" cy="26" r="4"/>
  <!-- torso slightly leaned back -->
  <line x1="32" y1="30" x2="34" y2="46"/>
  <!-- arms reaching up to wide bar -->
  <line x1="32" y1="32" x2="18" y2="20"/>
  <line x1="32" y1="32" x2="46" y2="20"/>
  <!-- seat -->
  <line x1="24" y1="46" x2="44" y2="46"/>
  <!-- legs under pad -->
  <line x1="34" y1="46" x2="30" y2="58"/>
  <line x1="34" y1="46" x2="40" y2="58"/>
</svg>
